name: E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Start containers
        run: docker compose up -d

      - name: Wait for services
        run: |
          echo "Waiting for PostgreSQL..."
          while ! docker compose exec postgres pg_isready -U user -d orders_db; do sleep 2; done
          echo "PostgreSQL is ready"
          echo "Waiting for MongoDB..."
          while ! docker compose exec mongodb mongosh --eval "db.runCommand({ping:1})" --quiet; do sleep 2; done
          echo "MongoDB is ready"
          echo "Waiting for Kafka..."
          while ! docker compose exec kafka kafka-topics --bootstrap-server localhost:9092 --list; do sleep 2; done
          echo "Kafka is ready"
          sleep 5

      - name: Clone and install common-dto
        run: |
          git clone https://github.com/antonmalov/kafka-order-common-dto.git common-dto
          cd common-dto && mvn clean install && cd ..

      - name: Clone and build producer
        run: |
          git clone https://github.com/antonmalov/kafka-order-producer.git producer
          cd producer && mvn clean package && cd ..

      - name: Clone and build consumer
        run: |
          git clone https://github.com/antonmalov/kafka-order-consumer.git consumer
          cd consumer && mvn clean package && cd ..

      - name: Prepare apps directory
        run: |
          mkdir -p apps
          cp producer/target/order-service-0.0.1-SNAPSHOT.jar apps/producer-service.jar
          cp consumer/target/notification-service-0.0.1-SNAPSHOT.jar apps/notification-service.jar

      - name: Test consumer startup (diagnostic)
        run: |
          echo "Starting consumer in background..."
          java -jar apps/notification-service.jar --server.port=8080 --spring.kafka.bootstrap-servers=localhost:9092 --spring.profiles.active=ci &
          CONSUMER_PID=$!
          echo "Waiting for consumer to start (30 seconds)..."
          sleep 30
          echo "Checking health endpoint..."
          if curl -f http://localhost:8080/actuator/health; then
            echo "Consumer started successfully"
          else
            echo "Consumer health check failed"
            echo "=== Consumer logs ==="
            # Здесь мы не можем получить логи, так как они выводятся в консоль, но они уже видны
            kill $CONSUMER_PID
            exit 1
          fi
          kill $CONSUMER_PID

      - name: Run E2E tests
        run: mvn clean test
        env:
          HEALTH_CHECK_TIMEOUT_SEC: 60
          SPRING_PROFILES_ACTIVE: ci

      - name: Stop containers
        if: always()
        run: docker compose down